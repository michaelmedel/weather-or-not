<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Weather a Year Ago Today</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #f5f7fa;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 520px;
  margin: auto;
}

.card {
  background: white;
  padding: 24px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

h1 {
  text-align: center;
  font-size: 24px;
  margin-bottom: 6px;
}

.subtitle {
  text-align: center;
  font-size: 14px;
  margin-bottom: 20px;
  color: #555;
}

/* Search */
input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 15px;
  margin-bottom: 6px;
}

.dropdown {
  background: white;
  border: 1px solid #ddd;
  border-radius: 12px;
  max-height: 150px;
  overflow-y: auto;
  margin-bottom: 12px;
}

.dropdown div {
  padding: 10px;
  cursor: pointer;
}

.dropdown div:hover {
  background: #f0f4f8;
}

/* Button */
button {
  width: 100%;
  padding: 16px;
  border: none;
  background: #2563eb;
  color: white;
  border-radius: 14px;
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 12px;
}

/* Weather boxes */
.weather-box {
  background: #f0f4f8;
  padding: 16px;
  border-radius: 14px;
  margin-top: 12px;
}

.summary {
  margin-top: 14px;
  padding: 14px;
  background: #e6f4ea;
  border-radius: 14px;
}

.trend {
  margin-top: 10px;
  padding: 12px;
  background: #eef2ff;
  border-radius: 14px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>Weather Check</h1>

<p class="subtitle">
Find out what the weather was like last year — and settle arguments forever.
</p>

<input id="search" placeholder="Search city..." oninput="searchCity()" />
<div id="results" class="dropdown"></div>

<button onclick="render()">Check the Weather</button>

<div id="today"></div>
<div id="lastYear"></div>
<div class="summary" id="summary"></div>
<div class="trend" id="trend"></div>

</div>
</div>

<script>
let selectedLocation = null;

function cToF(c){ return Math.round((c * 9/5) + 32); }

function getWeatherDescription(code){
  const map = {
    0:"clear skies",
    1:"mostly clear",
    2:"partly cloudy",
    3:"overcast",
    61:"light rain",
    63:"rain",
    65:"heavy rain",
    71:"snow",
    80:"showers",
    95:"thunderstorms"
  };
  return map[code] || "weird weather";
}

/* SEARCH + DROPDOWN */
async function searchCity(){
  const q = document.getElementById("search").value;
  if(q.length < 3) return;

  const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${q}`);
  const data = await res.json();

  const results = document.getElementById("results");
  results.innerHTML = "";

  if(!data.results) return;

  data.results.slice(0,5).forEach(r=>{
    const div = document.createElement("div");

    const label = `${r.name}, ${r.admin1 || ""}, ${r.country}`;
    div.innerText = label;

    div.onclick = ()=>{
      selectedLocation = r;
      document.getElementById("search").value = label;
      results.innerHTML = "";
    };

    results.appendChild(div);
  });
}

/* MAIN FUNCTION */
async function render(){
  if(!selectedLocation){
    document.getElementById("summary").innerText = "Pick a real place first.";
    return;
  }

  const { latitude, longitude, name, admin1 } = selectedLocation;

  const locationLabel = admin1 ? `${name}, ${admin1}` : name;

  const today = new Date();
  const lastYear = new Date();
  lastYear.setFullYear(today.getFullYear()-1);

  const f = d=>d.toISOString().split("T")[0];

  const todayData = await (await fetch(
    `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto`
  )).json();

  const lastData = await (await fetch(
    `https://archive-api.open-meteo.com/v1/archive?latitude=${latitude}&longitude=${longitude}&start_date=${f(lastYear)}&end_date=${f(lastYear)}&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto`
  )).json();

  const th = cToF(todayData.daily.temperature_2m_max[0]);
  const tl = cToF(todayData.daily.temperature_2m_min[0]);
  const tc = getWeatherDescription(todayData.daily.weathercode[0]);

  const lh = cToF(lastData.daily.temperature_2m_max[0]);
  const ll = cToF(lastData.daily.temperature_2m_min[0]);
  const lc = getWeatherDescription(lastData.daily.weathercode[0]);

  document.getElementById("today").innerHTML =
    `<div class="weather-box">
      <strong>Today (${locationLabel})</strong><br>
      ${th}° / ${tl}° — ${tc}
    </div>`;

  document.getElementById("lastYear").innerHTML =
    `<div class="weather-box">
      <strong>Last Year</strong><br>
      ${lh}° / ${ll}° — ${lc}
    </div>`;

  /* FUNNY SUMMARY */
  const summaryLines = [
    `Last year was ${lc} at ${lh}°. Today? ${tc} at ${th}°. Progress? Debatable.`,
    `If you remember it being nicer last year… you might be wrong.`,
    `Weather memory is unreliable. Data is not.`,
    `Last year: ${lh}°. Today: ${th}°. Mother Nature doing her thing.`,
  ];

  document.getElementById("summary").innerText =
    summaryLines[Math.floor(Math.random()*summaryLines.length)];

  /* TREND */
  document.getElementById("trend").innerText =
    th > lh
      ? "Warmer than last year. Climate glow-up."
      : "Colder than last year. Nature chose violence.";
}
</script>

</body>
</html>
