<script>
(adsbygoogle = window.adsbygoogle || []).push({});
(adsbygoogle = window.adsbygoogle || []).push({});
(adsbygoogle = window.adsbygoogle || []).push({});

function cToF(c){ return Math.round((c * 9/5) + 32); }

function getWeatherDescription(code){
  const map = {
    0:"☀️ clear skies",
    1:"🌤 mostly clear",
    2:"⛅ partly cloudy",
    3:"☁️ overcast",
    45:"🌫 foggy",
    61:"🌧 light rain",
    63:"🌧 steady rain",
    65:"🌧 heavy rain",
    71:"❄️ snow",
    80:"🌦 showers",
    95:"⛈ thunderstorms"
  };
  return map[code] || "🌥 mixed conditions";
}

async function render(){
  const location = document.getElementById("locationInput").value;

  const geo = await (await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${location}`)).json();
  if(!geo.results){ alert("Not found"); return; }

  const best = geo.results.find(r=>r.country_code==="US") || geo.results[0];

  const { latitude, longitude, name, admin1, country } = best;

  const locationLabel = admin1 
    ? `${name}, ${admin1}` 
    : `${name}, ${country}`;

  const today = new Date();
  const lastYear = new Date();
  lastYear.setFullYear(today.getFullYear()-1);

  const f = d=>d.toISOString().split("T")[0];

  const todayData = await (await fetch(
    `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto`
  )).json();

  const lastData = await (await fetch(
    `https://archive-api.open-meteo.com/v1/archive?latitude=${latitude}&longitude=${longitude}&start_date=${f(lastYear)}&end_date=${f(lastYear)}&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto`
  )).json();

  const th = cToF(todayData.daily.temperature_2m_max[0]);
  const tl = cToF(todayData.daily.temperature_2m_min[0]);
  const tc = getWeatherDescription(todayData.daily.weathercode[0]);

  const lh = cToF(lastData.daily.temperature_2m_max[0]);
  const ll = cToF(lastData.daily.temperature_2m_min[0]);
  const lc = getWeatherDescription(lastData.daily.weathercode[0]);

  document.getElementById("today").innerHTML =
    `<div class="weather-box">
      <strong>Today (${locationLabel})</strong><br>
      High: ${th}° / Low: ${tl}°<br>
      ${tc}
    </div>`;

  document.getElementById("lastYear").innerHTML =
    `<div class="weather-box">
      <strong>Last Year</strong><br>
      High: ${lh}° / Low: ${ll}°<br>
      ${lc}
    </div>`;

  document.getElementById("summary").innerText =
    `Last year was ${lc} at ${lh}°, today is ${tc} at ${th}°.`;

  document.getElementById("trend").innerText =
    th > lh ? "Warmer than last year 🔥" : "Colder than last year ❄️";
}

render();
</script>
