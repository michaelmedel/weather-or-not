<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Weather a Year Ago Today | Year-Ago Weather</title>
  <meta name="description" content="Check what the weather was like exactly one year ago today for any city. Compare today's weather vs last year instantly.">

  <!-- AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXX"
       crossorigin="anonymous"></script>

  <style>
    body {

      align-items: center;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="card-ui">

    <div class="brand">Year-Ago Weather</div>

    <h1>What Was the Weather Like a Year Ago Today?</h1>

    <p class="subtitle">
      Stop arguing with your friends about what the weather was like a year ago today. Prove it!
    </p>

    <input id="locationInput" placeholder="Enter city (e.g. New York)" />
    <button onclick="render()">Check Weather</button>

    <div id="today"></div>
    <div id="lastYear"></div>

    <div class="summary" id="summary"></div>
    <div class="trend" id="trend"></div>

    <div class="footer">
      <a href="/about.html">About</a> |
      <a href="/privacy.html">Privacy</a>
    </div>

  </div>
</div>

<div class="bottom-ad">
  <ins class="adsbygoogle"
       style="display:block;width:100%;height:90px"
       data-ad-client="ca-pub-XXXXXXXXXXXX"
       data-ad-slot="BOTTOM_SLOT"></ins>
</div>

<script>
(adsbygoogle = window.adsbygoogle || []).push({});

const params = new URLSearchParams(window.location.search);
document.getElementById("locationInput").value = params.get("city") || "New York";

function cToF(c){ return Math.round((c * 9/5) + 32); }

function getWeatherDescription(code){
  const map = {
    0:"clear skies",1:"mainly clear",2:"partly cloudy",3:"overcast",
    45:"foggy",61:"light rain",63:"rain",65:"heavy rain",
    71:"snow",80:"rain showers",95:"thunderstorms"
  };
  return map[code] || "mixed conditions";
}

async function render(){
  const location = document.getElementById("locationInput").value;

  const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${location}`);
  const geoData = await geoRes.json();

  if(!geoData.results){ alert("Location not found"); return; }

  const results = geoData.results;
  const best = results.find(r=>r.country_code==="US") || results[0];

  const { latitude, longitude, name, country } = best;

  const today = new Date();
  const lastYear = new Date();
  lastYear.setFullYear(today.getFullYear()-1);

  const formatDate = d=>d.toISOString().split("T")[0];

  const todayData = await (await fetch(
    `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto`
  )).json();

  const lastYearData = await (await fetch(
    `https://archive-api.open-meteo.com/v1/archive?latitude=${latitude}&longitude=${longitude}&start_date=${formatDate(lastYear)}&end_date=${formatDate(lastYear)}&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto`
  )).json();

  const todayHigh = cToF(todayData.daily.temperature_2m_max[0]);
  const todayLow = cToF(todayData.daily.temperature_2m_min[0]);
  const todayCond = getWeatherDescription(todayData.daily.weathercode[0]);

  const lastHigh = cToF(lastYearData.daily.temperature_2m_max[0]);
  const lastLow = cToF(lastYearData.daily.temperature_2m_min[0]);
  const lastCond = getWeatherDescription(lastYearData.daily.weathercode[0]);

  document.getElementById("today").innerHTML = `
    <div class="weather-box">
      <strong>Today (${name})</strong><br>
      ${todayHigh}° / ${todayLow}° — ${todayCond}
    </div>`;

  document.getElementById("lastYear").innerHTML = `
    <div class="weather-box">
      <strong>Last Year</strong><br>
      ${lastHigh}° / ${lastLow}° — ${lastCond}
    </div>`;

  document.getElementById("summary").innerText =
    `Last year felt ${lastCond} at ${lastHigh}°, today is ${todayCond} at ${todayHigh}°.`;

  document.getElementById("trend").innerText =
    todayHigh > lastHigh ? "Warmer than last year 🔥" : "Colder than last year ❄️";
}

render();
</script>

</body>
</html>
