<html lang="en">
<head>

       crossorigin="anonymous"></script>

  <style>
    body {
      font-family: Arial, sans-serif;

      margin: 0;

    .container {
      max-width: 600px;
      margin: auto;

      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    .brand {
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: #2563eb;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    h1 {
      text-align: center;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      color: #555;

    }

    .seo-text {
      text-align: center;

      color: #666;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
      margin-bottom: 12px;
      font-size: 14px;
    }

    button {
      display: block;
      margin: 10px auto;
      padding: 12px 18px;
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
    }

    button:hover {
      background: #1e4fd1;
    }

    .card {
      display: flex;
      justify-content: space-between;
      padding: 16px;
      border-radius: 12px;

      margin-bottom: 10px;
    }

    .summary {
      margin-top: 15px;
      padding: 14px;
      background: #e6f4ea;
      border-radius: 12px;
    }

    .trend {
      margin-top: 10px;
      padding: 12px;
      background: #eef2ff;
      border-radius: 12px;
    }

    .ad-inline {
      margin: 20px 0;
      text-align: center;
    }

    .bottom-ad {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 90px;
      background: white;
      border-top: 1px solid #eee;
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="brand">Year-Ago Weather</div>

  <h1>What Was the Weather Like a Year Ago Today?</h1>

  <p class="subtitle">
    Compare today's weather with the same day last year.
  </p>

  <p class="seo-text">
    Enter any city to instantly see historical weather data and compare temperatures.
  </p>

  <!-- Top Ad -->
  <div class="ad-inline">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-XXXXXXXXXXXX"
         data-ad-slot="TOP_SLOT"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
  </div>

  <input id="locationInput" placeholder="Enter city (e.g. New York)" />
  <button onclick="render()">Check Weather</button>

  <div id="today"></div>
  <div id="lastYear"></div>

  <div class="summary" id="summary"></div>
  <div class="trend" id="trend"></div>

  <!-- Mid Ad -->
  <div class="ad-inline">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-XXXXXXXXXXXX"
         data-ad-slot="MID_SLOT"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
  </div>
</div>

<!-- Bottom Ad -->
<div class="bottom-ad">
  <ins class="adsbygoogle"
       style="display:block;width:100%;height:90px"
       data-ad-client="ca-pub-XXXXXXXXXXXX"
       data-ad-slot="BOTTOM_SLOT"></ins>
</div>

<script>
  (adsbygoogle = window.adsbygoogle || []).push({});
  (adsbygoogle = window.adsbygoogle || []).push({});
  (adsbygoogle = window.adsbygoogle || []).push({});

  const params = new URLSearchParams(window.location.search);
  const defaultCity = params.get("city") || "New York";
  document.getElementById("locationInput").value = defaultCity;

  function cToF(c) {
    return Math.round((c * 9/5) + 32);
  }

  async function render() {
    const location = document.getElementById("locationInput").value;

    const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${location}`);
    const geoData = await geoRes.json();

    if (!geoData.results) {
      alert("Location not found");
      return;
    }

    const { latitude, longitude, name, country } = geoData.results[0];

    document.title = `Weather in ${name} – Today vs Last Year | Year-Ago Weather`;

    const today = new Date();
    const lastYear = new Date();
    lastYear.setFullYear(today.getFullYear() - 1);

    const formatDate = d => d.toISOString().split("T")[0];

    const todayRes = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&daily=temperature_2m_max,temperature_2m_min&timezone=auto`
    );
    const todayData = await todayRes.json();

    const lastYearRes = await fetch(
      `https://archive-api.open-meteo.com/v1/archive?latitude=${latitude}&longitude=${longitude}&start_date=${formatDate(lastYear)}&end_date=${formatDate(lastYear)}&daily=temperature_2m_max,temperature_2m_min&timezone=auto`
    );
    const lastYearData = await lastYearRes.json();

    const todayHigh = cToF(todayData.daily.temperature_2m_max[0]);
    const todayLow = cToF(todayData.daily.temperature_2m_min[0]);
    const lastHigh = cToF(lastYearData.daily.temperature_2m_max[0]);
    const lastLow = cToF(lastYearData.daily.temperature_2m_min[0]);

    document.getElementById("today").innerHTML = `
      <h3>Today (${name}, ${country})</h3>
      <div class="card">
        <div>High: ${todayHigh}°F</div>
        <div>Low: ${todayLow}°F</div>
      </div>
    `;

    document.getElementById("lastYear").innerHTML = `
      <h3>Last Year</h3>
      <div class="card">
        <div>High: ${lastHigh}°F</div>
        <div>Low: ${lastLow}°F</div>
      </div>
    `;

    document.getElementById("summary").innerText =
      `Last year was ${lastHigh}°F, today is ${todayHigh}°F.`;

    document.getElementById("trend").innerText =
      todayHigh > lastHigh ? "It's warmer than last year." : "It's cooler than last year.";
  }

  render();
</script>
<div style="text-align:center; font-size:12px; margin-top:20px;">

</body>
</html>
